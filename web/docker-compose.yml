# pi — web + never-ending worker, sharing one data volume.
#   docker compose up -d --build
#   docker compose logs -f worker
services:
  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    image: pi
    container_name: pi-web
    restart: unless-stopped
    command: ["python", "/app/web/server.py"]
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      DATA_DIR: "/data"
    ports:
      - "8000:8000"
    volumes:
      - pidata:/data

  worker:
    build:
      context: ..
      dockerfile: web/Dockerfile
    image: pi
    container_name: pi-worker
    restart: unless-stopped
    command: ["python", "/app/web/worker.py"]
    environment:
      DATA_DIR: "/data"
      START_DIGITS: "1000000"     # first milestone
      MAX_DIGITS: "0"             # 0 = compute forever
      WORKERS: "0"                # 0 = use all cores; set e.g. "16" to pin
      CHUNKS_PER_WORKER: "4"
      VERIFY: "1"
      REFERENCE_FILE: "/data/reference/pi_ref.txt"
      # For verifying beyond 1e9, provide a segmented source, e.g.:
      # PI_REF_SEGMENT_TEMPLATE: "https://your-host/pi_{start}_{end}.txt"
    volumes:
      - pidata:/data
    # For max throughput give the container all cores (no cpus limit) and
    # plenty of RAM. On Proxmox: CPU type "host", ballooning off, fast NVMe.

volumes:
  pidata:
