# pi — web + never-ending worker, sharing one data volume.
#   docker compose up -d --build
#   docker compose logs -f worker
services:
  web:
    build:
      context: ..
      dockerfile: web/Dockerfile
    image: pi
    container_name: pi-web
    restart: unless-stopped
    command: ["python", "/app/web/server.py"]
    environment:
      HOST: "0.0.0.0"
      PORT: "8000"
      DATA_DIR: "/data"
      REPO_URL: "https://github.com/ProfessorEngineergit/pi"
      BENCH_DIGITS: "100000"
    ports:
      - "8000:8000"
    volumes:
      - pidata:/data

  worker:
    build:
      context: ..
      dockerfile: web/Dockerfile
    image: pi
    container_name: pi-worker
    restart: unless-stopped
    command: ["python", "/app/web/worker.py"]
    environment:
      DATA_DIR: "/data"
      RESET_LIMIT: "20000000000"  # ~20 GB of digits per round, then back to 0 (effectively endless)
      BLOCK: "1000"               # verify chunk size (pi.delivery max is 1000)
      VERIFY: "1"                 # check each block against pi.delivery
    volumes:
      - pidata:/data

volumes:
  pidata:
